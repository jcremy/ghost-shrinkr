<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GhostShrinkr</title>
    <meta name="description" content="Drop files, shrink them, download. Runs entirely in your browser." />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      /* =========================================================
         GhostShrinkr — Apple-inspired theme
         Light by default, dark via data-theme="dark" on <html>.
         ========================================================= */

      :root,
      :root[data-theme="light"] {
        color-scheme: light;
        --bg: #fbfbfd;
        --surface: #ffffff;
        --surface-2: #f5f5f7;
        --surface-hover: #ececf0;
        --fg: #1d1d1f;
        --fg-soft: #424245;
        --muted: #86868b;
        --border: rgba(0, 0, 0, 0.08);
        --border-strong: rgba(0, 0, 0, 0.14);
        --accent: #0071e3;
        --accent-hover: #0077ed;
        --accent-fg: #ffffff;
        --warn: #ff9f0a;
        --danger: #ff3b30;
        --ok: #34c759;
        --type-jpg: #0071e3;
        --type-pdf: #c4610a;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);
        --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #000000;
        --surface: #1c1c1e;
        --surface-2: #2c2c2e;
        --surface-hover: #3a3a3c;
        --fg: #f5f5f7;
        --fg-soft: #d1d1d6;
        --muted: #98989d;
        --border: rgba(255, 255, 255, 0.10);
        --border-strong: rgba(255, 255, 255, 0.18);
        --accent: #0a84ff;
        --accent-hover: #409cff;
        --accent-fg: #ffffff;
        --warn: #ff9f0a;
        --danger: #ff453a;
        --ok: #30d158;
        --type-jpg: #64b5ff;
        --type-pdf: #ffb340;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.5), 0 1px 3px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.6), 0 2px 6px rgba(0, 0, 0, 0.4);
      }

      * { box-sizing: border-box; }
      *::selection { background: color-mix(in srgb, var(--accent) 30%, transparent); }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
          "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
        font-size: 15px;
        line-height: 1.47;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        transition: background-color .25s ease, color .25s ease;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 3rem 1.25rem 5rem;
      }

      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 2.5rem;
      }
      header .title h1 {
        margin: 0 0 .35rem;
        font-size: 2.1rem;
        font-weight: 600;
        letter-spacing: -0.022em;
        color: var(--fg);
      }
      header .title p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        letter-spacing: -0.01em;
      }

      .theme-toggle {
        flex: 0 0 auto;
        width: 38px;
        height: 38px;
        padding: 0;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--fg-soft);
        font-size: 1rem;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-sm);
        transition: transform .2s ease, background .2s, color .2s, border-color .2s;
      }
      .theme-toggle:hover { background: var(--surface-hover); color: var(--fg); }
      .theme-toggle:active { transform: scale(0.94); }

      /* ---------- drop zone ---------- */
      #dropzone {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 3rem 1.5rem;
        text-align: center;
        color: var(--muted);
        cursor: pointer;
        user-select: none;
        box-shadow: var(--shadow-sm);
        transition: border-color .2s ease, background .2s ease,
          color .2s ease, box-shadow .25s ease, transform .2s ease;
      }
      #dropzone:hover {
        border-color: var(--border-strong);
        box-shadow: var(--shadow-md);
      }
      #dropzone.dragging {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 6%, var(--surface));
        color: var(--fg);
        box-shadow: var(--shadow-lg);
        transform: translateY(-1px);
      }
      #dropzone.loading {
        border-color: var(--accent);
        color: var(--fg);
        pointer-events: none;
        position: relative;
      }
      #dropzone.loading::after {
        content: "Reading files…";
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: color-mix(in srgb, var(--surface) 88%, transparent);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        border-radius: inherit;
        font-size: .9rem;
        color: var(--fg);
        animation: fade-in .15s ease-out;
      }
      @keyframes fade-in { from { opacity: 0; } }
      #dropzone strong {
        display: block;
        color: var(--fg);
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      #dropzone .sub {
        display: block;
        margin-top: .4rem;
        font-size: .9rem;
        color: var(--muted);
      }
      #dropzone small {
        display: block;
        margin-top: 1rem;
        font-size: .75rem;
        color: var(--muted);
        opacity: .8;
      }

      /* ---------- file list ---------- */
      #file-list {
        margin-top: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: .5rem;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: .9rem 1rem;
        box-shadow: var(--shadow-sm);
        transition: box-shadow .2s ease, border-color .2s ease, background .2s ease;
      }
      .card:hover { box-shadow: var(--shadow-md); }
      .card.processing { border-color: color-mix(in srgb, var(--warn) 45%, var(--border)); }
      .card.error { border-color: color-mix(in srgb, var(--danger) 45%, var(--border)); }

      .card-row {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .type-tag {
        flex: 0 0 auto;
        font-size: .62rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        padding: 2px 6px;
        border-radius: 5px;
        line-height: 1.4;
        text-transform: uppercase;
      }
      .type-tag.type-jpg {
        color: var(--type-jpg);
        background: color-mix(in srgb, var(--type-jpg) 14%, transparent);
      }
      .type-tag.type-pdf {
        color: var(--type-pdf);
        background: color-mix(in srgb, var(--type-pdf) 16%, transparent);
      }

      .info {
        flex: 1 1 auto;
        min-width: 0;
      }
      .info .name-row {
        display: flex;
        align-items: center;
        gap: .5rem;
        min-width: 0;
      }
      .info .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex: 0 0 auto;
        background: var(--muted);
        opacity: .45;
      }
      .card.processing .status-dot { background: var(--warn); opacity: 1; animation: pulse 1.4s ease-in-out infinite; }
      .card.done .status-dot { background: var(--ok); opacity: 1; }
      .card.error .status-dot { background: var(--danger); opacity: 1; }
      @keyframes pulse { 50% { opacity: .35; } }

      .info .name {
        font-weight: 500;
        font-size: .95rem;
        color: var(--fg);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        letter-spacing: -0.005em;
      }
      .info .meta {
        margin-top: .2rem;
        font-size: .8rem;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.003em;
      }
      .info .meta .saved { color: var(--ok); font-weight: 500; margin-left: .15rem; }
      .info .meta .pending-download { color: var(--accent); font-weight: 500; }
      .info .progress {
        margin-top: .55rem;
        height: 3px;
        background: var(--surface-2);
        border-radius: 999px;
        overflow: hidden;
      }
      .info .progress > div {
        height: 100%;
        background: var(--warn);
        width: 0;
        border-radius: inherit;
        transition: width .2s;
      }

      /* ---------- buttons ---------- */
      .actions { display: flex; gap: .4rem; flex: 0 0 auto; }

      button {
        font: inherit;
        font-size: .875rem;
        font-weight: 500;
        letter-spacing: -0.005em;
        background: var(--surface-2);
        color: var(--fg);
        border: 1px solid transparent;
        border-radius: 980px;
        padding: .5rem 1rem;
        cursor: pointer;
        transition: background .15s, color .15s, transform .12s, box-shadow .15s;
      }
      button:hover:not(:disabled) { background: var(--surface-hover); }
      button:active:not(:disabled) { transform: scale(0.97); }
      button:disabled { opacity: .35; cursor: not-allowed; }

      button.primary {
        background: var(--accent);
        color: var(--accent-fg);
        font-weight: 600;
        padding: .55rem 1.25rem;
        box-shadow: 0 1px 2px color-mix(in srgb, var(--accent) 40%, transparent);
      }
      button.primary:hover:not(:disabled) {
        background: var(--accent-hover);
        box-shadow: 0 4px 12px color-mix(in srgb, var(--accent) 35%, transparent);
      }

      button.icon {
        padding: .45rem .75rem;
        font-size: .85rem;
      }
      button.gear {
        padding: 0;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 1rem;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      button.gear.active { background: color-mix(in srgb, var(--accent) 14%, var(--surface-2)); color: var(--accent); }
      button.danger:hover:not(:disabled) { color: var(--danger); background: color-mix(in srgb, var(--danger) 10%, var(--surface-2)); }

      /* ---------- card settings ---------- */
      .card-settings {
        margin-top: .9rem;
        padding-top: .9rem;
        border-top: 1px solid var(--border);
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: .55rem 1rem;
        align-items: center;
        font-size: .8rem;
        color: var(--muted);
      }
      .card-settings label {
        white-space: nowrap;
        font-weight: 500;
        color: var(--fg-soft);
      }
      .card-settings input[type=range] {
        width: 100%;
        accent-color: var(--accent);
      }
      .card-settings .val {
        font-variant-numeric: tabular-nums;
        min-width: 3.2rem;
        text-align: right;
        color: var(--fg);
        font-weight: 500;
      }
      .card-settings-reset {
        grid-column: 1 / -1;
        display: flex;
        justify-content: flex-end;
        margin-top: .3rem;
      }
      .card-settings-reset button {
        font-size: .75rem;
        color: var(--muted);
        background: transparent;
        padding: .35rem .75rem;
      }
      .card-settings-reset button:hover:not(:disabled) {
        color: var(--fg);
        background: var(--surface-2);
      }

      /* ---------- settings popover ---------- */
      .header-actions {
        display: flex;
        align-items: flex-start;
        gap: .5rem;
        flex: 0 0 auto;
      }
      .settings-wrap { position: relative; }

      .settings-popover {
        position: absolute;
        top: calc(100% + .5rem);
        right: 0;
        width: min(360px, calc(100vw - 2rem));
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow-lg);
        padding: 1rem 1.1rem 1.1rem;
        z-index: 100;
        display: grid;
        gap: 1rem;
        animation: popover-in .18s ease-out;
      }
      @keyframes popover-in {
        from { opacity: 0; transform: translateY(-4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      #settings-toggle[aria-expanded="true"] {
        background: var(--surface-hover);
        color: var(--fg);
        border-color: var(--border-strong);
      }

      .popover-close {
        position: absolute;
        top: .55rem;
        right: .55rem;
        width: 26px;
        height: 26px;
        padding: 0;
        border-radius: 50%;
        background: transparent;
        color: var(--muted);
        font-size: 1.1rem;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .popover-close:hover:not(:disabled) {
        background: var(--surface-2);
        color: var(--fg);
      }

      .popover-footer {
        display: flex;
        justify-content: flex-end;
        margin-top: .2rem;
        padding-top: .9rem;
        border-top: 1px solid var(--border);
      }
      .popover-footer button {
        font-size: .8rem;
        color: var(--muted);
        background: transparent;
      }
      .popover-footer button:hover:not(:disabled) {
        color: var(--fg);
        background: var(--surface-2);
      }

      .setup-group {
        display: grid;
        gap: .55rem;
      }
      .setup-group-title {
        font-size: .72rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .setup-row {
        display: grid;
        grid-template-columns: 6.5rem 1fr 3.2rem;
        align-items: center;
        gap: .9rem;
        font-size: .85rem;
      }
      .setup-row label {
        color: var(--fg-soft);
        font-weight: 500;
      }
      .setup-row label.with-check {
        display: inline-flex;
        align-items: center;
        gap: .5rem;
        cursor: pointer;
      }
      .setup-row label.with-check input[type="checkbox"] {
        margin: 0;
        accent-color: var(--accent);
        cursor: pointer;
      }
      .setup-row input[type=text]:disabled {
        opacity: .4;
        cursor: not-allowed;
      }
      .setup-row input[type=range] {
        width: 100%;
        accent-color: var(--accent);
      }
      .setup-row .val {
        text-align: right;
        font-variant-numeric: tabular-nums;
        color: var(--fg);
        font-weight: 500;
      }
      .setup-row input[type=text] {
        background: var(--surface-2);
        color: var(--fg);
        border: 1px solid transparent;
        border-radius: 8px;
        padding: .45rem .7rem;
        font: inherit;
        font-size: .85rem;
        transition: border-color .15s, background .15s;
        grid-column: 2 / span 2;
      }
      .setup-row input[type=text]:focus {
        outline: none;
        border-color: var(--accent);
        background: var(--surface);
      }

      /* ---------- action bar ---------- */
      #action-bar {
        margin-top: .6rem;
        display: flex;
        align-items: center;
        gap: .85rem;
        padding: 1rem 1.1rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow-sm);
      }
      #stats {
        flex: 1 1 auto;
        color: var(--muted);
        font-size: .88rem;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.005em;
      }
      #stats .saved { color: var(--ok); font-weight: 600; }

      /* ---------- toasts ---------- */
      #toasts {
        position: fixed;
        bottom: 1.25rem;
        right: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: .5rem;
        z-index: 1000;
        pointer-events: none;
      }
      .toast {
        background: var(--surface);
        color: var(--fg);
        border: 1px solid var(--border);
        padding: .7rem 1rem;
        border-radius: 12px;
        font-size: .85rem;
        max-width: 340px;
        box-shadow: var(--shadow-lg);
        animation: slidein .25s ease-out;
      }
      .toast::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--warn);
        margin-right: .55rem;
        vertical-align: middle;
      }
      .toast.error::before { background: var(--danger); }
      @keyframes slidein {
        from { transform: translateX(12px); opacity: 0; }
        to   { transform: translateX(0); opacity: 1; }
      }

      .hidden { display: none !important; }

      /* ---------- responsive ---------- */
      @media (max-width: 520px) {
        main { padding: 2rem 1rem 4rem; }
        header { margin-bottom: 1.75rem; }
        header .title h1 { font-size: 1.7rem; }
        #dropzone { padding: 2.2rem 1rem; border-radius: 16px; }
        .card { padding: .75rem .85rem; border-radius: 12px; }
        .card-row { gap: .75rem; }
        .thumb { width: 40px; height: 40px; flex-basis: 40px; }
        .actions button.icon span { display: none; }
        #action-bar, #options { flex-wrap: wrap; padding: .85rem 1rem; }
        #stats { flex-basis: 100%; margin-bottom: .5rem; }
        #options .hint { display: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="title">
          <h1>GhostShrinkr</h1>
          <p>Drop files, shrink them, download. Runs entirely in your browser.</p>
        </div>
        <div class="header-actions">
          <div class="settings-wrap">
            <button
              id="settings-toggle"
              class="theme-toggle"
              type="button"
              aria-label="Settings"
              aria-expanded="false"
              title="Settings"
            >⚙</button>
            <div id="settings-popover" class="settings-popover hidden" role="dialog" aria-label="Settings">
              <button id="settings-close" type="button" class="popover-close" aria-label="Close settings">×</button>
              <div class="setup-group">
                <div class="setup-group-title">Filename</div>
                <div class="setup-row">
                  <label for="suffix-enabled" class="with-check">
                    <input id="suffix-enabled" type="checkbox" checked />
                    <span>Suffix</span>
                  </label>
                  <input id="suffix-input" type="text" value="_comp" placeholder="(none)" spellcheck="false" />
                </div>
              </div>
              <div class="setup-group">
                <div class="setup-group-title">JPG</div>
                <div class="setup-row">
                  <label for="g-jpg-resize">Resize</label>
                  <input id="g-jpg-resize" type="range" min="25" max="100" step="1" value="67" />
                  <span class="val" id="g-jpg-resize-val">67 %</span>
                </div>
                <div class="setup-row">
                  <label for="g-jpg-quality">Quality</label>
                  <input id="g-jpg-quality" type="range" min="30" max="95" step="1" value="72" />
                  <span class="val" id="g-jpg-quality-val">72 %</span>
                </div>
              </div>
              <div class="setup-group">
                <div class="setup-group-title">PDF</div>
                <div class="setup-row">
                  <label for="g-pdf-dpi">DPI</label>
                  <input id="g-pdf-dpi" type="range" min="72" max="220" step="1" value="130" />
                  <span class="val" id="g-pdf-dpi-val">130 dpi</span>
                </div>
                <div class="setup-row">
                  <label for="g-pdf-quality">Quality</label>
                  <input id="g-pdf-quality" type="range" min="30" max="95" step="1" value="78" />
                  <span class="val" id="g-pdf-quality-val">78 %</span>
                </div>
              </div>
              <div class="popover-footer">
                <button id="reset-defaults" type="button" class="icon">Reset to defaults</button>
              </div>
            </div>
          </div>
          <button
            id="theme-toggle"
            class="theme-toggle"
            type="button"
            aria-label="Toggle dark mode"
            title="Toggle appearance"
          ></button>
        </div>
      </header>

      <section
        id="dropzone"
        role="button"
        tabindex="0"
        aria-label="Drop files here or click to browse"
      >
        <strong>Drop JPG or PDF here</strong>
        <span class="sub">or click to browse</span>
        <small>Up to 50 files, 100&nbsp;MB each · Nothing is uploaded</small>
        <input
          id="file-input"
          type="file"
          multiple
          accept=".jpg,.jpeg,.pdf,image/jpeg,application/pdf"
          hidden
        />
      </section>

      <section id="file-list"></section>

      <section id="action-bar" class="hidden">
        <div id="stats"></div>
        <button id="cancel-btn" type="button" class="hidden">Cancel</button>
        <button id="clear-btn" type="button">Clear all</button>
        <button id="shrink-btn" type="button" class="primary">Shrink</button>
      </section>
    </main>
    <div id="toasts" aria-live="polite"></div>

    <script>
      // ============================================================
      // GhostShrinkr — all processing is local. No network at runtime.
      // ============================================================

      const MAX_FILES = 50;
      const MAX_FILE_BYTES = 100 * 1024 * 1024;
      const DOWNLOAD_DELAY_MS = 150;
      const PDF_SKIP_SIZE = 100 * 1024;
      const PDF_VECTOR_TEXT_THRESHOLD = 50;

      // PDF.js worker
      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      }

      // Factory defaults — the baseline used for a fresh session and when
      // the user hits "Reset to defaults" in the settings popover.
      const FACTORY_DEFAULTS = Object.freeze({
        suffix: "_comp",
        suffixEnabled: true,
        jpg: Object.freeze({ resize: 67, quality: 72 }),
        pdf: Object.freeze({ dpi: 130, quality: 78 }),
      });

      // ----- state -----
      // state.defaults are the globals used as templates for new files.
      // Per-card settings can override them via the ⚙ panel. When the user
      // changes a global, it cascades to pending files that haven't been
      // individually customized (entry.customized === false).
      const state = {
        files: [],
        isProcessing: false,
        canceled: false,
        activeRenderTask: null,
        suffix: FACTORY_DEFAULTS.suffix,
        suffixEnabled: FACTORY_DEFAULTS.suffixEnabled,
        defaults: {
          jpg: { ...FACTORY_DEFAULTS.jpg },
          pdf: { ...FACTORY_DEFAULTS.pdf },
        },
      };

      // ----- helpers -----
      const genId = () => Math.random().toString(36).slice(2, 10);

      function fmtBytes(n) {
        if (n < 1024) return n + " B";
        if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
        return (n / 1024 / 1024).toFixed(2) + " MB";
      }

      function fmtPct(delta) {
        const p = Math.round(delta * 100);
        return (p >= 0 ? "−" : "+") + Math.abs(p) + "%";
      }

      function kindOf(file) {
        const n = file.name.toLowerCase();
        if (n.endsWith(".jpg") || n.endsWith(".jpeg") || file.type === "image/jpeg") return "jpg";
        if (n.endsWith(".pdf") || file.type === "application/pdf") return "pdf";
        return null;
      }

      function withSuffix(filename, suffix) {
        if (!suffix) return filename;
        const dot = filename.lastIndexOf(".");
        if (dot <= 0) return filename + suffix;
        return filename.slice(0, dot) + suffix + filename.slice(dot);
      }

      function toast(msg, kind) {
        const el = document.createElement("div");
        el.className = "toast" + (kind === "error" ? " error" : "");
        el.textContent = msg;
        document.getElementById("toasts").appendChild(el);
        setTimeout(() => {
          el.style.transition = "opacity .3s";
          el.style.opacity = "0";
          setTimeout(() => el.remove(), 300);
        }, 3000);
      }

      // ----- file intake -----
      // Snapshot the FileList synchronously (FileLists can go stale after
      // the drop event ends), then append entries one by one with a yield
      // between each so the UI paints a new card on every tick instead of
      // freezing until the whole batch is processed.
      async function addFiles(fileList) {
        const incoming = Array.from(fileList);
        for (const f of incoming) {
          const kind = kindOf(f);
          if (!kind) {
            toast(`${f.name}: unsupported`, "error");
            continue;
          }
          if (f.size > MAX_FILE_BYTES) {
            toast(`${f.name}: too big (max 100 MB)`, "error");
            continue;
          }
          if (state.files.length >= MAX_FILES) {
            toast(`Max ${MAX_FILES} files — extra ignored`, "error");
            break;
          }
          const entry = {
            id: genId(),
            file: f,
            kind,
            status: "pending",
            origSize: f.size,
            compSize: 0,
            compBlob: null,
            downloaded: false,
            err: "",
            pageN: 0,
            pageTotal: 0,
            noGain: false,
            expanded: false,
            customized: false,
            settings: { ...state.defaults[kind] },
          };
          state.files.push(entry);
          render();
          // Yield a frame so the just-appended card paints before we touch
          // the next file. On a fast machine this is imperceptible; on a
          // slow drop it turns the stall into a progressive reveal.
          await new Promise((r) => requestAnimationFrame(() => r()));
        }
      }

      function removeFile(id) {
        const i = state.files.findIndex((f) => f.id === id);
        if (i >= 0) {
          state.files.splice(i, 1);
          render();
        }
      }

      function clearAll() {
        state.files = [];
        render();
      }

      function resetToPending(entry) {
        entry.status = "pending";
        entry.compBlob = null;
        entry.compSize = 0;
        entry.downloaded = false;
        entry.noGain = false;
        entry.err = "";
        entry.pageN = 0;
        entry.pageTotal = 0;
      }

      async function previewOne(entry) {
        if (state.isProcessing) return;

        // Keep at most one checked (but not yet downloaded) blob in memory.
        // Any other file sitting in "done-not-downloaded" state gets rewound
        // to pending so its compBlob can be garbage-collected.
        for (const f of state.files) {
          if (f === entry) continue;
          if (f.status === "done" && !f.downloaded && f.compBlob) {
            resetToPending(f);
          }
        }

        state.isProcessing = true;
        state.canceled = false;
        render();
        await compressOne(entry);
        state.isProcessing = false;
        state.canceled = false;
        render();
      }

      function openCompressed(entry) {
        if (!entry.compBlob) return;
        const url = URL.createObjectURL(entry.compBlob);
        window.open(url, "_blank");
        // Object URL stays valid for the life of the new tab; no explicit revoke.
      }

      // ----- compression: JPG -----
      async function compressJpg(file, settings) {
        const bitmap = await createImageBitmap(file, { imageOrientation: "from-image" });
        const scale = settings.resize / 100;
        const w = Math.max(1, Math.round(bitmap.width * scale));
        const h = Math.max(1, Math.round(bitmap.height * scale));
        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(bitmap, 0, 0, w, h);
        bitmap.close && bitmap.close();
        const blob = await new Promise((res, rej) => {
          canvas.toBlob(
            (b) => (b ? res(b) : rej(new Error("Encode failed"))),
            "image/jpeg",
            settings.quality / 100
          );
        });
        return blob;
      }

      class CanceledError extends Error {
        constructor() { super("canceled"); this.name = "CanceledError"; }
      }
      function throwIfCanceled() {
        if (state.canceled) throw new CanceledError();
      }

      // ----- compression: PDF -----
      async function compressPdf(entry) {
        const file = entry.file;
        const s = entry.settings;
        if (file.size < PDF_SKIP_SIZE) {
          entry.noGain = true;
          return file;
        }
        const buf = await file.arrayBuffer();
        throwIfCanceled();
        const data = new Uint8Array(buf);
        const doc = await window.pdfjsLib.getDocument({ data }).promise;
        throwIfCanceled();

        // Vector detection on page 1
        try {
          const page1 = await doc.getPage(1);
          const text = await page1.getTextContent();
          const chars = text.items.reduce((a, it) => a + (it.str ? it.str.length : 0), 0);
          if (chars > PDF_VECTOR_TEXT_THRESHOLD) {
            entry.noGain = true;
            try { doc.destroy(); } catch (_) {}
            return file;
          }
        } catch (_) {
          // If we can't inspect, fall through to rasterization.
        }
        throwIfCanceled();

        const total = doc.numPages;
        entry.pageTotal = total;
        entry.pageN = 0;

        const { jsPDF } = window.jspdf;
        let pdf = null;
        const renderScale = s.dpi / 72;
        const jpegQuality = s.quality / 100;

        try {
          for (let i = 1; i <= total; i++) {
            throwIfCanceled();
            const page = await doc.getPage(i);
            const vpPt = page.getViewport({ scale: 1 });
            const widthPt = vpPt.width;
            const heightPt = vpPt.height;
            const vpRender = page.getViewport({ scale: renderScale });

            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.floor(vpRender.width));
            canvas.height = Math.max(1, Math.floor(vpRender.height));
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Store the active render task so the Cancel button can abort
            // it mid-render instead of waiting for the page to finish.
            const task = page.render({ canvasContext: ctx, viewport: vpRender, background: "white" });
            state.activeRenderTask = task;
            try {
              await task.promise;
            } catch (e) {
              if (state.canceled || (e && e.name === "RenderingCancelledException")) {
                throw new CanceledError();
              }
              throw e;
            } finally {
              state.activeRenderTask = null;
            }

            const jpegDataUrl = canvas.toDataURL("image/jpeg", jpegQuality);
            const orientation = widthPt > heightPt ? "landscape" : "portrait";

            if (i === 1) {
              pdf = new jsPDF({
                unit: "pt",
                format: [widthPt, heightPt],
                orientation,
                compress: true,
              });
            } else {
              pdf.addPage([widthPt, heightPt], orientation);
            }
            pdf.addImage(jpegDataUrl, "JPEG", 0, 0, widthPt, heightPt, undefined, "FAST");

            entry.pageN = i;
            render();
            await new Promise((r) => setTimeout(r, 0));
          }
        } finally {
          try { doc.destroy(); } catch (_) {}
        }

        const out = pdf.output("blob");
        if (out.size >= file.size) {
          entry.noGain = true;
          return file;
        }
        return out;
      }

      // ----- compression orchestration -----
      async function compressOne(entry) {
        entry.status = "processing";
        entry.err = "";
        entry.noGain = false;
        render();
        try {
          let blob;
          if (entry.kind === "jpg") {
            blob = await compressJpg(entry.file, entry.settings);
            throwIfCanceled();
            if (blob.size >= entry.file.size) {
              entry.noGain = true;
              blob = entry.file;
            }
          } else {
            blob = await compressPdf(entry);
          }
          throwIfCanceled();
          entry.compBlob = blob;
          entry.compSize = blob.size;
          entry.status = "done";
        } catch (e) {
          if (state.canceled || (e && e.name === "CanceledError")) {
            entry.status = "pending";
            entry.compBlob = null;
            entry.compSize = 0;
            entry.pageN = 0;
            entry.pageTotal = 0;
          } else {
            entry.status = "error";
            entry.err = (e && e.message) || String(e);
          }
        }
        render();
      }

      async function shrinkAll() {
        if (state.isProcessing) return;

        const hasPending = state.files.some((f) => f.status === "pending");
        const hasUndownloaded = state.files.some(
          (f) => f.status === "done" && f.compBlob && !f.downloaded
        );
        if (!hasPending && !hasUndownloaded) return;

        state.isProcessing = true;
        state.canceled = false;
        render();

        // Compress every pending file first.
        for (const entry of state.files) {
          if (state.canceled) break;
          if (entry.status === "pending") await compressOne(entry);
        }

        // Then download every file that has a compressed blob and hasn't
        // been handed off to the browser yet. Once downloaded, drop the
        // blob reference — the file lives on disk now, we don't need to
        // hold a copy in JS memory.
        const effectiveSuffix = state.suffixEnabled ? state.suffix : "";
        for (const entry of state.files) {
          if (state.canceled) break;
          if (entry.status !== "done" || !entry.compBlob) continue;
          if (entry.downloaded) continue;
          downloadBlob(entry.compBlob, withSuffix(entry.file.name, effectiveSuffix));
          entry.downloaded = true;
          entry.compBlob = null;
          render();
          await new Promise((r) => setTimeout(r, DOWNLOAD_DELAY_MS));
        }

        state.isProcessing = false;
        state.canceled = false;
        render();
      }

      function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 0);
      }

      // ----- rendering -----
      const listEl = document.getElementById("file-list");
      const barEl = document.getElementById("action-bar");
      const statsEl = document.getElementById("stats");
      const shrinkBtn = document.getElementById("shrink-btn");
      const clearBtn = document.getElementById("clear-btn");
      const cancelBtn = document.getElementById("cancel-btn");
      const suffixInput = document.getElementById("suffix-input");

      function render() {
        // List
        listEl.innerHTML = "";
        for (const e of state.files) {
          listEl.appendChild(renderCard(e));
        }

        // Action bar
        if (state.files.length === 0) {
          barEl.classList.add("hidden");
          return;
        }
        barEl.classList.remove("hidden");

        const pendingCount = state.files.filter((f) => f.status === "pending").length;
        const done = state.files.filter((f) => f.status === "done");
        const totalOrig = done.reduce((a, f) => a + f.origSize, 0);
        const totalComp = done.reduce((a, f) => a + f.compSize, 0);

        if (done.length === 0) {
          statsEl.textContent = `${state.files.length} file${state.files.length > 1 ? "s" : ""} ready`;
        } else if (totalOrig > 0) {
          const saved = 1 - totalComp / totalOrig;
          statsEl.innerHTML =
            `<span class="saved">${fmtPct(saved)} saved</span> · ` +
            `${fmtBytes(totalOrig)} → ${fmtBytes(totalComp)}`;
        }

        clearBtn.disabled = state.isProcessing;
        cancelBtn.classList.toggle("hidden", !state.isProcessing);
        cancelBtn.disabled = state.canceled;
        cancelBtn.textContent = state.canceled ? "Cancelling…" : "Cancel";
        suffixInput.disabled = state.isProcessing || !state.suffixEnabled;

        const undownloadedCount = done.filter((f) => !f.downloaded).length;
        const toDeliver = pendingCount + undownloadedCount;

        if (toDeliver > 0) {
          shrinkBtn.textContent = `Shrink ${toDeliver} file${toDeliver > 1 ? "s" : ""} ↓`;
          shrinkBtn.disabled = state.isProcessing;
        } else {
          shrinkBtn.textContent = "Shrink ↓";
          shrinkBtn.disabled = true;
        }
      }

      function renderCard(e) {
        const card = document.createElement("div");
        card.className = "card " + e.status;

        const row = document.createElement("div");
        row.className = "card-row";

        // Info
        const info = document.createElement("div");
        info.className = "info";

        const nameRow = document.createElement("div");
        nameRow.className = "name-row";

        const dot = document.createElement("span");
        dot.className = "status-dot";
        nameRow.appendChild(dot);

        const tag = document.createElement("span");
        tag.className = "type-tag type-" + e.kind;
        tag.textContent = e.kind.toUpperCase();
        nameRow.appendChild(tag);

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = e.file.name;
        nameRow.appendChild(name);

        info.appendChild(nameRow);

        const meta = document.createElement("div");
        meta.className = "meta";
        if (e.status === "pending") {
          meta.textContent = fmtBytes(e.origSize);
        } else if (e.status === "processing") {
          meta.textContent = e.pageTotal > 0 ? `Page ${e.pageN} / ${e.pageTotal}…` : "Processing…";
        } else if (e.status === "done") {
          if (e.noGain) {
            meta.textContent = `${fmtBytes(e.origSize)} · kept original (no gain)`;
          } else {
            const saved = 1 - e.compSize / e.origSize;
            meta.textContent = `${fmtBytes(e.origSize)} → ${fmtBytes(e.compSize)}`;
            const savedSpan = document.createElement("span");
            savedSpan.className = "saved";
            savedSpan.textContent = " " + fmtPct(saved);
            meta.appendChild(savedSpan);
          }
          if (!e.downloaded) {
            const pending = document.createElement("span");
            pending.className = "pending-download";
            pending.textContent = " · ready";
            meta.appendChild(pending);
          }
        } else if (e.status === "error") {
          meta.textContent = e.err || "Error";
        }
        info.appendChild(meta);

        if (e.status === "processing") {
          const progress = document.createElement("div");
          progress.className = "progress";
          const bar = document.createElement("div");
          if (e.pageTotal > 0) {
            bar.style.width = Math.round((e.pageN / e.pageTotal) * 100) + "%";
          } else {
            bar.style.width = "35%";
          }
          progress.appendChild(bar);
          info.appendChild(progress);
        }

        row.appendChild(info);

        // Actions
        const actions = document.createElement("div");
        actions.className = "actions";

        const canEdit = e.status !== "processing";

        if (canEdit) {
          const gear = document.createElement("button");
          gear.type = "button";
          gear.className = "gear" + (e.expanded ? " active" : "");
          gear.title = "Settings";
          gear.textContent = "⚙";
          gear.disabled = state.isProcessing;
          gear.onclick = () => {
            e.expanded = !e.expanded;
            render();
          };
          actions.appendChild(gear);
        }

        if (e.status === "pending") {
          const check = document.createElement("button");
          check.type = "button";
          check.className = "icon";
          check.textContent = "Check";
          check.title = "Compress with current settings — see the size and inspect the result before downloading";
          check.disabled = state.isProcessing;
          check.onclick = () => previewOne(e);
          actions.appendChild(check);
        }

        if (e.status === "done" && e.compBlob) {
          const view = document.createElement("button");
          view.type = "button";
          view.className = "icon";
          view.textContent = "View";
          view.title = "Open compressed file in a new tab";
          view.onclick = () => openCompressed(e);
          actions.appendChild(view);
        }

        if (e.status === "error") {
          const retry = document.createElement("button");
          retry.type = "button";
          retry.className = "icon";
          retry.textContent = "Retry";
          retry.disabled = state.isProcessing;
          retry.onclick = () => {
            resetToPending(e);
            render();
          };
          actions.appendChild(retry);
        }

        if (canEdit) {
          const rm = document.createElement("button");
          rm.type = "button";
          rm.className = "icon danger";
          rm.textContent = "Remove";
          rm.disabled = state.isProcessing;
          rm.onclick = () => removeFile(e.id);
          actions.appendChild(rm);
        }

        row.appendChild(actions);
        card.appendChild(row);

        // Settings panel
        if (e.expanded && canEdit) {
          card.appendChild(renderSettings(e));
        }

        return card;
      }

      function renderSettings(e) {
        const panel = document.createElement("div");
        panel.className = "card-settings";

        if (e.kind === "jpg") {
          panel.appendChild(slider(e, "resize", "Resize", 25, 100, 1, (v) => v + " %"));
          panel.appendChild(slider(e, "quality", "Quality", 30, 95, 1, (v) => v + " %"));
        } else {
          panel.appendChild(slider(e, "dpi", "DPI", 72, 220, 1, (v) => v + " dpi"));
          panel.appendChild(slider(e, "quality", "Quality", 30, 95, 1, (v) => v + " %"));
        }

        const resetRow = document.createElement("div");
        resetRow.className = "card-settings-reset";
        const resetBtn = document.createElement("button");
        resetBtn.type = "button";
        resetBtn.className = "icon";
        resetBtn.textContent = "Reset to defaults";
        resetBtn.disabled = state.isProcessing;
        resetBtn.onclick = () => {
          e.settings = { ...state.defaults[e.kind] };
          e.customized = false;
          if (e.status === "done") resetToPending(e);
          render();
        };
        resetRow.appendChild(resetBtn);
        panel.appendChild(resetRow);

        return panel;
      }

      function slider(entry, key, label, min, max, step, fmt) {
        const frag = document.createDocumentFragment();

        const lab = document.createElement("label");
        lab.textContent = label;

        const input = document.createElement("input");
        input.type = "range";
        input.min = min;
        input.max = max;
        input.step = step;
        input.value = entry.settings[key];
        input.disabled = state.isProcessing;

        const val = document.createElement("span");
        val.className = "val";
        val.textContent = fmt(entry.settings[key]);

        // Live label update while dragging — no full render.
        input.addEventListener("input", () => {
          entry.settings[key] = Number(input.value);
          entry.customized = true;
          val.textContent = fmt(entry.settings[key]);
        });

        // On release, if the file was already done, reset to pending so the
        // user can re-shrink with the new values.
        input.addEventListener("change", () => {
          if (entry.status === "done") {
            resetToPending(entry);
            render();
          }
        });

        frag.appendChild(lab);
        frag.appendChild(input);
        frag.appendChild(val);
        return frag;
      }

      // ----- event wiring -----
      const dropzone = document.getElementById("dropzone");
      const fileInput = document.getElementById("file-input");

      dropzone.addEventListener("click", () => fileInput.click());
      dropzone.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          fileInput.click();
        }
      });
      fileInput.addEventListener("change", (e) => {
        if (!e.target.files || !e.target.files.length) return;
        const snapshot = Array.from(e.target.files);
        e.target.value = "";
        dropzone.classList.add("loading");
        requestAnimationFrame(() => {
          addFiles(snapshot).finally(() => dropzone.classList.remove("loading"));
        });
      });
      ["dragenter", "dragover"].forEach((ev) => {
        dropzone.addEventListener(ev, (e) => {
          e.preventDefault();
          e.stopPropagation();
          dropzone.classList.add("dragging");
        });
      });
      ["dragleave", "drop"].forEach((ev) => {
        dropzone.addEventListener(ev, (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (ev === "dragleave" && e.target !== dropzone) return;
          dropzone.classList.remove("dragging");
        });
      });
      dropzone.addEventListener("drop", (e) => {
        if (!e.dataTransfer || !e.dataTransfer.files || !e.dataTransfer.files.length) return;
        // Snapshot immediately — FileList can be invalidated after this tick.
        const snapshot = Array.from(e.dataTransfer.files);
        dropzone.classList.add("loading");
        // Paint the loading state before touching the files.
        requestAnimationFrame(() => {
          addFiles(snapshot).finally(() => dropzone.classList.remove("loading"));
        });
      });
      window.addEventListener("dragover", (e) => e.preventDefault());
      window.addEventListener("drop", (e) => e.preventDefault());

      shrinkBtn.addEventListener("click", shrinkAll);
      clearBtn.addEventListener("click", clearAll);

      cancelBtn.addEventListener("click", () => {
        if (!state.isProcessing || state.canceled) return;
        state.canceled = true;
        // If a PDF page is rendering right now, abort it so the active
        // compressOne() resolves immediately instead of finishing the page.
        if (state.activeRenderTask) {
          try { state.activeRenderTask.cancel(); } catch (_) {}
        }
        render();
      });

      // ----- settings popover (global defaults) -----
      const settingsToggle = document.getElementById("settings-toggle");
      const settingsPopover = document.getElementById("settings-popover");

      const GLOBAL_FIELDS = [
        { id: "g-jpg-resize",   kind: "jpg", key: "resize",  fmt: (v) => v + " %" },
        { id: "g-jpg-quality",  kind: "jpg", key: "quality", fmt: (v) => v + " %" },
        { id: "g-pdf-dpi",      kind: "pdf", key: "dpi",     fmt: (v) => v + " dpi" },
        { id: "g-pdf-quality",  kind: "pdf", key: "quality", fmt: (v) => v + " %" },
      ];

      function cascadeDefaultsToPending(kind, key) {
        // Propagate global change to pending, non-customized files of the same kind.
        for (const f of state.files) {
          if (f.kind !== kind) continue;
          if (f.status !== "pending") continue;
          if (f.customized) continue;
          f.settings[key] = state.defaults[kind][key];
        }
      }

      for (const field of GLOBAL_FIELDS) {
        const input = document.getElementById(field.id);
        const valEl = document.getElementById(field.id + "-val");
        input.value = state.defaults[field.kind][field.key];
        valEl.textContent = field.fmt(Number(input.value));

        input.addEventListener("input", () => {
          const v = Number(input.value);
          state.defaults[field.kind][field.key] = v;
          valEl.textContent = field.fmt(v);
          cascadeDefaultsToPending(field.kind, field.key);
          // Re-render any expanded cards so their inline sliders reflect the new value.
          const touched = state.files.some(
            (f) => f.kind === field.kind && f.status === "pending" && !f.customized && f.expanded
          );
          if (touched) render();
        });
      }

      suffixInput.addEventListener("input", () => {
        state.suffix = suffixInput.value;
      });

      const suffixEnabled = document.getElementById("suffix-enabled");
      function applySuffixEnabled() {
        state.suffixEnabled = suffixEnabled.checked;
        suffixInput.disabled = !suffixEnabled.checked;
      }
      suffixEnabled.addEventListener("change", applySuffixEnabled);
      applySuffixEnabled();

      function setSettingsOpen(open) {
        settingsPopover.classList.toggle("hidden", !open);
        settingsToggle.setAttribute("aria-expanded", open ? "true" : "false");
      }

      settingsToggle.addEventListener("click", (ev) => {
        ev.stopPropagation();
        const isOpen = settingsToggle.getAttribute("aria-expanded") === "true";
        setSettingsOpen(!isOpen);
      });

      // Click outside to close
      document.addEventListener("click", (ev) => {
        if (settingsToggle.getAttribute("aria-expanded") !== "true") return;
        if (settingsPopover.contains(ev.target)) return;
        if (settingsToggle.contains(ev.target)) return;
        setSettingsOpen(false);
      });

      // Escape to close
      document.addEventListener("keydown", (ev) => {
        if (ev.key === "Escape" && settingsToggle.getAttribute("aria-expanded") === "true") {
          setSettingsOpen(false);
          settingsToggle.focus();
        }
      });

      // Close button
      document.getElementById("settings-close").addEventListener("click", (ev) => {
        ev.stopPropagation();
        setSettingsOpen(false);
        settingsToggle.focus();
      });

      // Reset to factory defaults
      document.getElementById("reset-defaults").addEventListener("click", () => {
        state.suffix = FACTORY_DEFAULTS.suffix;
        state.suffixEnabled = FACTORY_DEFAULTS.suffixEnabled;
        state.defaults.jpg = { ...FACTORY_DEFAULTS.jpg };
        state.defaults.pdf = { ...FACTORY_DEFAULTS.pdf };

        suffixInput.value = state.suffix;
        suffixEnabled.checked = state.suffixEnabled;
        applySuffixEnabled();
        for (const field of GLOBAL_FIELDS) {
          const input = document.getElementById(field.id);
          const valEl = document.getElementById(field.id + "-val");
          const v = state.defaults[field.kind][field.key];
          input.value = v;
          valEl.textContent = field.fmt(v);
          cascadeDefaultsToPending(field.kind, field.key);
        }
        render();
      });

      // ----- theme toggle -----
      // The only thing we persist in localStorage. Everything else stays
      // session-only per the PRD. If no explicit pref exists, follow the
      // OS setting (and keep following it via the matchMedia listener).
      const THEME_KEY = "ghostshrinkr.theme";
      const themeToggle = document.getElementById("theme-toggle");
      const darkMql = window.matchMedia("(prefers-color-scheme: dark)");
      const root = document.documentElement;

      function applyTheme(theme) {
        root.setAttribute("data-theme", theme);
        themeToggle.textContent = theme === "dark" ? "☀" : "☾";
        themeToggle.setAttribute(
          "aria-label",
          theme === "dark" ? "Switch to light mode" : "Switch to dark mode"
        );
      }

      let stored = null;
      try { stored = localStorage.getItem(THEME_KEY); } catch (_) {}
      applyTheme(stored === "dark" || stored === "light"
        ? stored
        : (darkMql.matches ? "dark" : "light"));

      themeToggle.addEventListener("click", () => {
        const cur = root.getAttribute("data-theme");
        const next = cur === "dark" ? "light" : "dark";
        applyTheme(next);
        try { localStorage.setItem(THEME_KEY, next); } catch (_) {}
      });

      // If the user hasn't explicitly chosen, follow system changes live.
      darkMql.addEventListener("change", (ev) => {
        let pref = null;
        try { pref = localStorage.getItem(THEME_KEY); } catch (_) {}
        if (pref !== "dark" && pref !== "light") {
          applyTheme(ev.matches ? "dark" : "light");
        }
      });

      render();
    </script>
  </body>
</html>
