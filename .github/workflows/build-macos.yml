name: Build macOS app

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  # tauri-action creates a GitHub Release and uploads the .dmg as a
  # release asset, both of which require contents: write. The default
  # GITHUB_TOKEN is read-only for most scopes, so we opt in explicitly.
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync app version from git tag
        # When triggered by a tag like v1.2.3, stamp that version into
        # Cargo.toml and tauri.conf.json so the .app's internal version
        # string matches the GitHub Release. For workflow_dispatch runs
        # (no tag), the files are left as-is. This keeps the git tag as
        # the single source of truth — no manual file bumps required.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Syncing app version to $VERSION"

          # Cargo.toml: only the top-level [package] version is at the
          # start of a line; dependency versions live inside inline
          # tables and are not matched by ^version =
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" macos/src-tauri/Cargo.toml
          rm macos/src-tauri/Cargo.toml.bak

          # tauri.conf.json: use jq for safe JSON manipulation
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' macos/src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" macos/src-tauri/tauri.conf.json

          echo ""
          echo "--- Cargo.toml [package] version ---"
          grep '^version' macos/src-tauri/Cargo.toml
          echo "--- tauri.conf.json version ---"
          jq -r '.version' macos/src-tauri/tauri.conf.json

      - name: Generate icons from SVG
        run: |
          cd macos/src-tauri/icons

          # Rasterize SVG to a 1024x1024 PNG using macOS built-in rsvg or sips
          # The runner has rsvg-convert via librsvg (from Homebrew cache)
          if command -v rsvg-convert &>/dev/null; then
            rsvg-convert -w 1024 -h 1024 app-icon.svg -o icon-1024.png
          else
            brew install --quiet librsvg
            rsvg-convert -w 1024 -h 1024 app-icon.svg -o icon-1024.png
          fi

          # Generate required sizes
          sips -z 32 32 icon-1024.png --out 32x32.png
          sips -z 128 128 icon-1024.png --out 128x128.png
          sips -z 256 256 icon-1024.png --out 128x128@2x.png

          # Generate .icns via iconutil
          mkdir icon.iconset
          sips -z 16 16 icon-1024.png --out icon.iconset/icon_16x16.png
          sips -z 32 32 icon-1024.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32 icon-1024.png --out icon.iconset/icon_32x32.png
          sips -z 64 64 icon-1024.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 icon-1024.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 icon-1024.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 icon-1024.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 icon-1024.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 icon-1024.png --out icon.iconset/icon_512x512.png
          cp icon-1024.png icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns

          # Clean up temp files
          rm -rf icon.iconset icon-1024.png

          echo "Generated icons:"
          ls -lh *.png *.icns

      - name: Install Rust with both macOS targets
        # universal-apple-darwin is a virtual target that requires
        # both aarch64-apple-darwin (Apple Silicon) and
        # x86_64-apple-darwin (Intel) to be installed separately.
        # tauri-action then links them into a single fat binary.
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Decode notarization API key to disk
        # tauri-action expects APPLE_API_KEY_PATH to point at the .p8 file,
        # not the file contents. We store the .p8 base64-encoded in the
        # APPLE_API_KEY_BASE64 secret and materialize it here for the build.
        # Only on tag push — workflow_dispatch builds skip notarization for
        # speed (~17 min Apple round-trip vs ad-hoc signing in seconds).
        if: github.ref_type == 'tag'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey.p8
          echo "APPLE_API_KEY_PATH=$HOME/private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, publish (tag push only)
        # Tag push (v*): tauri-action signs with our Developer ID cert,
        # notarizes via the App Store Connect API key, signs the
        # .app.tar.gz update payload with the Tauri minisign key, emits
        # latest.json, and attaches everything to a public GitHub Release.
        # updaterJsonKeepUniversal=true: emit a single "darwin-universal"
        # platform entry in latest.json instead of trying to split the
        # universal binary into per-arch entries (which silently produces
        # no manifest at all). The updater plugin matches darwin-universal
        # on both Apple Silicon and Intel machines.
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: macos
          args: --target universal-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            Download **GhostShrinkr.dmg** from the Assets below, mount it, drag the app to Applications. Launch — no warnings. The app is Developer ID signed and notarized by Apple, and future updates install in-place via the in-app updater.

            See the [CHANGELOG](https://github.com/jcremy/ghost-shrinkr/blob/main/CHANGELOG.md) for what changed.
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple Developer ID signing
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Apple notarization (App Store Connect API key). APPLE_API_KEY
          # is the 10-char Key ID; the .p8 file lives at APPLE_API_KEY_PATH
          # (set by the decode step above from APPLE_API_KEY_BASE64).
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # Tauri auto-updater signing. Causes tauri-action to sign the
          # .app.tar.gz update payload and emit a signed latest.json
          # next to the .dmg, which the in-app updater fetches.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate and upload latest.json (tag push only)
        # tauri-action's built-in latest.json upload is unreliable for
        # universal-apple-darwin builds: it logs "Signature not found for
        # the updater JSON. Skipping upload..." even when the .sig file
        # is right next to the .tar.gz on disk (suspected: it looks for
        # the .sig under the renamed asset name rather than the source
        # filename). We build latest.json ourselves from the actual .sig
        # file and upload it via gh — completely reliable, exactly the
        # shape tauri-plugin-updater expects.
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          SIG_PATH="macos/src-tauri/target/universal-apple-darwin/release/bundle/macos/GhostShrinkr.app.tar.gz.sig"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          URL="https://github.com/jcremy/ghost-shrinkr/releases/download/v${VERSION}/GhostShrinkr_universal.app.tar.gz"

          if [ ! -f "$SIG_PATH" ]; then
            echo "::warning::Expected .sig at $SIG_PATH — searching the bundle dir."
            find macos/src-tauri/target -name "*.sig" -type f 2>/dev/null || true
            FOUND=$(find macos/src-tauri/target -name "*.tar.gz.sig" -type f 2>/dev/null | head -1)
            if [ -z "$FOUND" ]; then
              echo "::error::No .tar.gz.sig anywhere under target/. Updater signing didn't run — check createUpdaterArtifacts and TAURI_SIGNING_PRIVATE_KEY."
              exit 1
            fi
            SIG_PATH="$FOUND"
            echo "Using $SIG_PATH"
          fi

          # Emit per-arch keys pointing at the same universal .tar.gz.
          # tauri-plugin-updater 2.10.x looks up the running arch
          # directly (darwin-aarch64 / darwin-x86_64) and v1.4.0 shipped
          # with only "darwin-universal", which produced TargetNotFound
          # at check() and a "Update check failed" toast.
          jq -n \
            --arg v "$VERSION" \
            --rawfile sig "$SIG_PATH" \
            --arg pub "$PUB_DATE" \
            --arg url "$URL" \
            '{
              version: $v,
              notes: "See https://github.com/jcremy/ghost-shrinkr/blob/main/CHANGELOG.md",
              pub_date: $pub,
              platforms: {
                "darwin-aarch64": {
                  signature: ($sig | rtrimstr("\n")),
                  url: $url
                },
                "darwin-x86_64": {
                  signature: ($sig | rtrimstr("\n")),
                  url: $url
                }
              }
            }' > latest.json

          echo "--- latest.json ---"
          cat latest.json
          echo ""

          gh release upload "v${VERSION}" latest.json --clobber

      - name: Upload stable-named .dmg (tag push only)
        # Provides a version-agnostic download URL for the README:
        # https://github.com/jcremy/ghost-shrinkr/releases/latest/download/GhostShrinkr.dmg
        # GitHub's /releases/latest/download/<filename> only matches the
        # exact asset name, so we upload a copy alongside the versioned
        # one. The versioned .dmg still exists on the release for users
        # who want a specific build.
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          SRC="macos/src-tauri/target/universal-apple-darwin/release/bundle/dmg/GhostShrinkr_${VERSION}_universal.dmg"
          cp "$SRC" GhostShrinkr.dmg
          gh release upload "v${VERSION}" GhostShrinkr.dmg --clobber

      - name: Build ad-hoc signed (workflow_dispatch only)
        # Manual dispatch builds: no Developer ID, no notarization, no
        # update-channel signing. Just compile and bundle with ad-hoc
        # signature so the .dmg can be opened locally (with xattr -cr or
        # right-click → Open). ~4 min. Uploaded only as a CI artifact.
        # Crucially, none of the APPLE_*/TAURI_SIGNING_* env vars are
        # passed — tauri-action treats their absence as "skip that step".
        # An empty string here would still trigger code paths that fail
        # (e.g. `security import` on an empty cert).
        if: github.ref_type != 'tag'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: macos
          args: --target universal-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"

      - name: Upload .dmg as CI artifact (fallback for non-tag runs)
        # Path includes universal-apple-darwin because of the --target
        # arg above. If you ever drop back to the default target, change
        # this to macos/src-tauri/target/release/bundle/dmg/*.dmg
        uses: actions/upload-artifact@v4
        with:
          name: GhostShrinkr-macOS
          path: macos/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error